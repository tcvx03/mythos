<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 12px;
      font-family: sans-serif;
    }
    textarea {
      width: 100%;
      height: 80px;
      margin-bottom: 8px;
      box-sizing: border-box;
      font-size: 14px;
      resize: vertical;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #1557b0; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <textarea id="textInput" placeholder="Type text to inject into the doc..."></textarea>
  <button id="typeBtn">Type into Doc</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
